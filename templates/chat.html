<!DOCTYPE html>
  <html>
  <head>
      <title>Inventory Assistant</title>
      <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: Arial, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
          header { background: #2563eb; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
          header h1 { font-size: 18px; }
          header a { color: white; font-size: 13px; text-decoration: none; opacity: 0.8; }
          #chat-window { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
          .message { max-width: 75%; padding: 12px 16px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
          .user { background: #2563eb; color: white; align-self: flex-end; }
          .bot { background: white; color: #333; align-self: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
          .bot .sql { font-family: monospace; font-size: 12px; background: #f3f4f6; padding: 8px; border-radius: 4px; margin-top: 8px; white-space: pre-wrap; color: #555; }
          .bot table { border-collapse: collapse; margin-top: 10px; font-size: 12px; width: 100%; }
          .bot th { background: #f3f4f6; padding: 6px 10px; border: 1px solid #ddd; text-align: left; }
          .bot td { padding: 6px 10px; border: 1px solid #ddd; }
          #input-area { padding: 16px 24px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
          #question { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
          #send-btn { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
          #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }
          .thinking { color: #999; font-style: italic; }
      </style>
  </head>
  <body>
      <header>
          <h1>Inventory Assistant</h1>
          <a href="/logout">Sign out</a>
      </header>
      <div id="chat-window">
          <div class="message bot">Hi! Ask me anything about your current inventory. For example: <em>"How many iPhone 14 Pros are in the Product Room?"</em> or <em>"What was the total device cost received in February 2026?"</em></div>
      </div>
      <div id="input-area">
          <input type="text" id="question" placeholder="Ask a question about inventory..." autofocus>
          <button id="send-btn" onclick="sendQuestion()">Ask</button>
      </div>

      <script>
          document.getElementById('question').addEventListener('keydown', function(e) {
              if (e.key === 'Enter') sendQuestion();
          });

          function sendQuestion() {
              const input = document.getElementById('question');
              const question = input.value.trim();
              if (!question) return;

              appendMessage(question, 'user');
              input.value = '';
              document.getElementById('send-btn').disabled = true;

              const thinking = appendMessage('Thinking...', 'bot thinking');

              fetch('/ask', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ question })
              })
              .then(r => r.json())
              .then(data => {
                  thinking.remove();
                  let html = `<div>${data.answer}</div>`;
                  if (data.sql) {
                      html += `<div class="sql">${data.sql}</div>`;
                  }
                  if (data.columns && data.rows && data.rows.length > 0 && data.rows.length > 1) {
                      html += buildTable(data.columns, data.rows);
                  }
                  const msg = document.createElement('div');
                  msg.className = 'message bot';
                  msg.innerHTML = html;
                  document.getElementById('chat-window').appendChild(msg);
                  scrollToBottom();
              })
              .catch(() => {
                  thinking.remove();
                  appendMessage('Something went wrong. Please try again.', 'bot');
              })
              .finally(() => {
                  document.getElementById('send-btn').disabled = false;
              });
          }

          function buildTable(columns, rows) {
              let html = '<table><tr>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
              rows.forEach(row => {
                  html += '<tr>' + row.map(cell => `<td>${cell ?? ''}</td>`).join('') + '</tr>';
              });
              return html + '</table>';
          }

          function appendMessage(text, className) {
              const div = document.createElement('div');
              div.className = `message ${className}`;
              div.textContent = text;
              document.getElementById('chat-window').appendChild(div);
              scrollToBottom();
              return div;
          }

          function scrollToBottom() {
              const win = document.getElementById('chat-window');
              win.scrollTop = win.scrollHeight;
          }
      </script>
  </body>
  </html>
