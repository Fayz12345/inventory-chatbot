{% extends "_base.html" %}
{% block title %}Audit Log — Bridge Platform{% endblock %}
{% block body %}
<div class="page page--narrow">
  <div class="page-head">
    <div><h1>Audit Log <span class="count">({{ logs | length }})</span></h1></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>When</th>
          <th>Actor</th>
          <th>Action</th>
          <th>Target</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody>
        {% for l in logs %}
        <tr>
          <td>{{ l.created_at }}</td>
          <td>{{ l.actor }}</td>
          <td>{{ l.action }}</td>
          <td>{{ l.target }}</td>
          <td>{{ l.detail }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
