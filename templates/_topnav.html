<header class="app-header">
  <a class="app-header__brand" href="/home"><span class="dot"></span> Bridge Platform</a>
  <nav class="app-nav">
    <a href="/home" class="{{ 'active' if active == 'home' }}">Home</a>
    <a href="/chat" class="{{ 'active' if active == 'chat' }}">Chatbot</a>
    <a href="/ecommerce/dashboard" class="{{ 'active' if active == 'ecommerce' }}">Ecommerce</a>
    <a href="/analytics/" class="{{ 'active' if active == 'analytics' }}">Analytics</a>
    {% if is_admin %}<a href="/admin/users" class="{{ 'active' if active == 'admin' }}">Users</a>{% endif %}
  </nav>
  <div class="app-header__right">
    {% if username %}<span class="who">{{ username }}</span>{% endif %}
    <a href="/logout">Sign out</a>
  </div>
</header>
