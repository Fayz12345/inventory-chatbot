{% extends "_base.html" %}
{% block title %}Sign in — Bridge Platform{% endblock %}
{% block topnav %}{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand"><span class="dot"></span> Bridge Platform</div>
    <h2>Sign in</h2>
    {% if error %}<div class="error" style="text-align:center;margin-bottom:14px">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
