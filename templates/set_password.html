<!DOCTYPE html>
<html>
<head>
<title>Set Password — Bridge Platform</title>
<style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5;
           display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 400px; overflow: hidden; }
    .card-header { background: #2563eb; color: #fff; padding: 20px 28px; }
    .card-header h1 { margin: 0; font-size: 20px; }
    .card-body { padding: 28px; }
    .card-body p { margin: 0 0 20px; color: #555; font-size: 14px; line-height: 1.5; }
    label { display: block; font-weight: bold; font-size: 13px; color: #444; margin-bottom: 4px; }
    input[type=password] {
        width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px;
        font-size: 14px; box-sizing: border-box; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 6px;
           font-size: 15px; font-weight: bold; cursor: pointer; background: #2563eb; color: #fff; }
    .btn:hover { background: #1d4ed8; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px;
             border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .success { text-align: center; }
    .success .icon { font-size: 48px; margin-bottom: 16px; }
    .success h2 { margin: 0 0 8px; color: #333; font-size: 20px; }
    .success p { color: #666; }
    .success a { display: inline-block; margin-top: 20px; padding: 10px 28px; background: #2563eb;
                 color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
    .success a:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>Bridge Platform</h1>
    </div>
    <div class="card-body">
        {% if success %}
        <div class="success">
            <div class="icon">&#10003;</div>
            <h2>Password Set</h2>
            <p>Your password has been set successfully. You can now sign in.</p>
            <a href="/">Sign In</a>
        </div>
        {% elif not token %}
        <div class="error">{{ error }}</div>
        <p style="text-align:center"><a href="/" style="color:#2563eb">Go to Sign In</a></p>
        {% else %}
        <p>Welcome, <strong>{{ username }}</strong>. Set your password to get started.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Minimum 6 characters" required>
            <label for="confirm">Confirm Password</label>
            <input type="password" name="confirm" id="confirm" placeholder="Re-enter password" required>
            <button type="submit" class="btn">Set Password</button>
        </form>
        {% endif %}
    </div>
</div>
</body>
</html>
